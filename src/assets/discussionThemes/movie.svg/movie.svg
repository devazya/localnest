<svg viewBox="0 0 1200 800" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        
        <!-- DEFS: Gradients and Filters -->
        <defs>
            <!-- Background Gradient -->
            <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
                <stop offset="0%" stop-color="#4B207B"/>
                <stop offset="60%" stop-color="#230E4E"/>
                <stop offset="100%" stop-color="#0b0213"/>
            </radialGradient>

            <!-- Spotlight Gradients -->
            <linearGradient id="spotlight1" x1="50%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#A575F1" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#A575F1" stop-opacity="0.0"/>
            </linearGradient>
            
            <linearGradient id="spotlight2" x1="50%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#D0B5FF" stop-opacity="0.5"/>
                <stop offset="100%" stop-color="#D0B5FF" stop-opacity="0.0"/>
            </linearGradient>

            <!-- Clapperboard Gradient -->
            <linearGradient id="clapperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#2A2A35"/>
                <stop offset="100%" stop-color="#14141C"/>
            </linearGradient>

            <!-- Popcorn Shadow Gradient -->
            <radialGradient id="popcornGrad" cx="30%" cy="30%" r="70%" fx="25%" fy="25%">
                <stop offset="0%" stop-color="#FFFFFF"/>
                <stop offset="40%" stop-color="#FFF3C4"/>
                <stop offset="80%" stop-color="#E1B855"/>
                <stop offset="100%" stop-color="#B88A20"/>
            </radialGradient>

            <!-- Theater Seat Gradient -->
            <linearGradient id="seatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#3C1B68"/>
                <stop offset="100%" stop-color="#1A0738"/>
            </linearGradient>

            <linearGradient id="cushionTop" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#A575F1" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#A575F1" stop-opacity="0.0"/>
            </linearGradient>

            <linearGradient id="cylinderDark" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#000" stop-opacity="0.85"/>
                <stop offset="15%" stop-color="#000" stop-opacity="0.1"/>
                <stop offset="85%" stop-color="#000" stop-opacity="0.1"/>
                <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
            </linearGradient>
            
            <linearGradient id="cylinderLight" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="30%" stop-color="#FFF" stop-opacity="0"/>
                <stop offset="50%" stop-color="#FFF" stop-opacity="0.5"/>
                <stop offset="70%" stop-color="#FFF" stop-opacity="0"/>
            </linearGradient>

            <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="8" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
            </filter>
            
            <filter id="dropShadowSmall" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="3" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
            </filter>

            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            
            <filter id="blur-bg" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="8" />
            </filter>
            <filter id="blur-mid" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3.5" />
            </filter>
            
            <linearGradient id="depthFade" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0b0213" stop-opacity="1.0"/>
                <stop offset="35%" stop-color="#0b0213" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#0b0213" stop-opacity="0.0"/>
            </linearGradient>
        </defs>

        <!-- 1. BASE BACKGROUND -->
        <rect width="1200" height="800" fill="url(#bgGradient)"/>

        <!-- 2. VOLUMETRIC SPOTLIGHTS -->
        <polygon points="750,-100 200,800 900,800" fill="url(#spotlight1)" style="mix-blend-mode: screen;"/>
        <polygon points="300,-100 0,800 700,800" fill="url(#spotlight2)" style="mix-blend-mode: screen;"/>
        <ellipse cx="750" cy="50" rx="40" ry="20" fill="#FFFFFF" filter="url(#glow)" opacity="0.8"/>
        <ellipse cx="300" cy="20" rx="30" ry="15" fill="#FFFFFF" filter="url(#glow)" opacity="0.6"/>

        <!-- Atmospheric Fog Overlay -->
        <rect width="1200" height="800" fill="url(#depthFade)" style="pointer-events: none;"/>

        <!-- 3. THEATER SEATS -->
        <g transform="translate(-100, 30)">
            <g opacity="0.25" filter="url(#blur-bg)">
                <rect x="0" y="380" width="80" height="100" rx="15" fill="url(#seatGrad)"/>
                <rect x="100" y="380" width="80" height="100" rx="15" fill="url(#seatGrad)"/>
                <rect x="200" y="380" width="80" height="100" rx="15" fill="url(#seatGrad)"/>
                <rect x="300" y="380" width="80" height="100" rx="15" fill="url(#seatGrad)"/>
                <rect x="400" y="380" width="80" height="100" rx="15" fill="url(#seatGrad)"/>
                <rect x="500" y="380" width="80" height="100" rx="15" fill="url(#seatGrad)"/>
            </g>
            
            <g opacity="0.4" filter="url(#blur-mid)">
                <rect x="-50" y="450" width="100" height="120" rx="18" fill="#1F083F"/>
                <rect x="70" y="450" width="100" height="120" rx="18" fill="#1F083F"/>
                <rect x="190" y="450" width="100" height="120" rx="18" fill="#1F083F"/>
                <rect x="310" y="450" width="100" height="120" rx="18" fill="#1F083F"/>
                <rect x="430" y="450" width="100" height="120" rx="18" fill="#1F083F"/>
                <rect x="550" y="450" width="100" height="120" rx="18" fill="#1F083F"/>
            </g>

            <g opacity="0.7" filter="url(#blur-mid)">
                <rect x="-80" y="540" width="130" height="160" rx="22" fill="url(#seatGrad)"/>
                <rect x="70" y="540" width="130" height="160" rx="22" fill="url(#seatGrad)"/>
                <rect x="220" y="540" width="130" height="160" rx="22" fill="url(#seatGrad)"/>
                <rect x="370" y="540" width="130" height="160" rx="22" fill="url(#seatGrad)"/>
                <rect x="520" y="540" width="130" height="160" rx="22" fill="url(#seatGrad)"/>
            </g>

            <g opacity="0.95" filter="url(#dropShadowSmall)">
                <rect x="-100" y="650" width="160" height="200" rx="25" fill="#1A0738"/>
                <rect x="-96" y="652" width="152" height="194" rx="22" fill="none" stroke="url(#cushionTop)" stroke-width="2" opacity="0.5"/>
                <rect x="80" y="650" width="160" height="200" rx="25" fill="#1A0738"/>
                <rect x="84" y="652" width="152" height="194" rx="22" fill="none" stroke="url(#cushionTop)" stroke-width="2" opacity="0.5"/>
                <rect x="260" y="650" width="160" height="200" rx="25" fill="#1A0738"/>
                <rect x="264" y="652" width="152" height="194" rx="22" fill="none" stroke="url(#cushionTop)" stroke-width="2" opacity="0.5"/>
                <rect x="440" y="650" width="160" height="200" rx="25" fill="#1A0738"/>
                <rect x="444" y="652" width="152" height="194" rx="22" fill="none" stroke="url(#cushionTop)" stroke-width="2" opacity="0.5"/>
            </g>
        </g>

        <!-- 4. CLAPPERBOARD -->
        <g transform="translate(850, 480) rotate(-10)" opacity="0.9" filter="url(#dropShadow)">
            <rect x="-8" y="68" width="280" height="200" rx="10" fill="#0A0A10"/>
            <rect x="0" y="60" width="280" height="200" rx="10" fill="url(#clapperGrad)" stroke="#111" stroke-width="2"/>
            <rect x="2" y="62" width="276" height="196" rx="8" fill="none" stroke="#666" stroke-width="1.5" opacity="0.6"/>
            <rect x="10" y="70" width="260" height="180" rx="5" fill="none" stroke="#555" stroke-width="1.5" opacity="0.5"/>
            <rect x="10" y="70" width="260" height="8" fill="#000" opacity="0.4"/>
            <line x1="20" y1="120" x2="100" y2="120" stroke="#999" stroke-width="2.5" opacity="0.6"/>
            <line x1="20" y1="160" x2="200" y2="160" stroke="#999" stroke-width="2.5" opacity="0.6"/>
            <line x1="20" y1="200" x2="150" y2="200" stroke="#999" stroke-width="2.5" opacity="0.6"/>
            <rect x="-4" y="34" width="280" height="25" rx="4" fill="#050508"/>
            <rect x="0" y="30" width="280" height="25" rx="4" fill="#222"/>
            <polygon points="10,30 40,30 30,55 0,55" fill="#FFF"/>
            <polygon points="70,30 100,30 90,55 60,55" fill="#FFF"/>
            <polygon points="130,30 160,30 150,55 120,55" fill="#FFF"/>
            <polygon points="190,30 220,30 210,55 180,55" fill="#FFF"/>
            <polygon points="250,30 280,30 270,55 240,55" fill="#FFF"/>
            <rect x="0" y="30" width="280" height="8" rx="4" fill="#FFF" opacity="0.3"/>
            <rect x="0" y="50" width="280" height="5" rx="2" fill="#000" opacity="0.4"/>
            <g transform="rotate(-15, 0, 30)">
                <rect x="-4" y="4" width="280" height="25" rx="4" fill="#050508"/>
                <rect x="0" y="0" width="280" height="25" rx="4" fill="#222"/>
                <polygon points="10,0 40,0 30,25 0,25" fill="#FFF"/>
                <polygon points="70,0 100,0 90,25 60,25" fill="#FFF"/>
                <polygon points="130,0 160,0 150,25 120,25" fill="#FFF"/>
                <polygon points="190,0 220,0 210,25 180,25" fill="#FFF"/>
                <polygon points="250,0 280,0 270,25 240,25" fill="#FFF"/>
                <rect x="0" y="0" width="280" height="8" rx="4" fill="#FFF" opacity="0.3"/>
                <rect x="0" y="20" width="280" height="5" rx="2" fill="#000" opacity="0.4"/>
            </g>
            <circle cx="10" cy="27" r="8" fill="#333"/>
            <circle cx="10" cy="27" r="6" fill="#888"/>
            <circle cx="9" cy="26" r="3" fill="#CCC"/>
        </g>

        <!-- 5. POPCORN BUCKET -->
        <g transform="translate(580, 520) scale(1.2, 1.1)" filter="url(#blur-mid)" opacity="0.85">
            <circle cx="0" cy="0" r="30" fill="url(#popcornGrad)"/>
            <circle cx="-40" cy="10" r="25" fill="url(#popcornGrad)"/>
            <circle cx="40" cy="10" r="28" fill="url(#popcornGrad)"/>
            <circle cx="-25" cy="-20" r="24" fill="url(#popcornGrad)"/>
            <circle cx="20" cy="-25" r="22" fill="url(#popcornGrad)"/>
            <circle cx="-60" cy="30" r="20" fill="url(#popcornGrad)"/>
            <circle cx="65" cy="35" r="20" fill="url(#popcornGrad)"/>
            <circle cx="-15" cy="-35" r="18" fill="url(#popcornGrad)"/>
            <circle cx="35" cy="-10" r="25" fill="url(#popcornGrad)"/>
            <circle cx="80" cy="50" r="15" fill="url(#popcornGrad)"/>
            <circle cx="-75" cy="50" r="16" fill="url(#popcornGrad)"/>
            <circle cx="0" cy="-15" r="32" fill="url(#popcornGrad)"/>
            <circle cx="-35" cy="25" r="26" fill="url(#popcornGrad)"/>
            <circle cx="30" cy="30" r="24" fill="url(#popcornGrad)"/>
        </g>

        <g transform="translate(580, 560)" filter="url(#dropShadow)">
            <path d="M-110,0 L110,0 L90,250 L-90,250 Z" fill="#F4F4F9"/>
            <path d="M-110,0 L-85,0 L-70,250 L-90,250 Z" fill="#E62E4D"/>
            <path d="M-45,0 L-15,0 L-15,250 L-40,250 Z" fill="#E62E4D"/>
            <path d="M15,0 L45,0 L40,250 L15,250 Z" fill="#E62E4D"/>
            <path d="M85,0 L110,0 L90,250 L70,250 Z" fill="#E62E4D"/>
            <path d="M-110,0 L110,0 L90,250 L-90,250 Z" fill="url(#cylinderDark)" style="pointer-events: none; mix-blend-mode: multiply;"/>
            <path d="M-110,0 L110,0 L90,250 L-90,250 Z" fill="url(#cylinderLight)" style="pointer-events: none; mix-blend-mode: screen;"/>
            <ellipse cx="0" cy="250" rx="90" ry="8" fill="#6B1322" opacity="0.8"/>
            <ellipse cx="0" cy="4" rx="113" ry="14" fill="#6B1322"/>
            <ellipse cx="0" cy="0" rx="110" ry="12" fill="#E62E4D"/>
            <ellipse cx="0" cy="-2" rx="107" ry="10" fill="#FFFFFF"/>
            <ellipse cx="0" cy="-4" rx="100" ry="8" fill="#F4F4F9" opacity="0.6"/>
        </g>

        <g transform="translate(580, 555)" filter="url(#dropShadowSmall)">
            <circle cx="-80" cy="-5" r="18" fill="url(#popcornGrad)"/>
            <circle cx="-40" cy="5" r="22" fill="url(#popcornGrad)"/>
            <circle cx="0" cy="8" r="22" fill="url(#popcornGrad)"/>
            <circle cx="45" cy="-2" r="20" fill="url(#popcornGrad)"/>
            <circle cx="85" cy="-8" r="18" fill="url(#popcornGrad)"/>
            <circle cx="-105" cy="-10" r="14" fill="url(#popcornGrad)"/>
            <circle cx="105" cy="-8" r="14" fill="url(#popcornGrad)"/>
        </g>

        <!-- 6. STARS & PARTICLES -->
        <g fill="#FFF3C4" filter="url(#glow)">
            <path d="M 400,350 L 405,370 L 425,375 L 405,380 L 400,400 L 395,380 L 375,375 L 395,370 Z" fill="#FFD700" opacity="0.9"/>
            <path d="M 850,250 L 853,260 L 863,263 L 853,266 L 850,276 L 847,266 L 837,263 L 847,260 Z" fill="#FFD700" opacity="0.8"/>
            <path d="M 120,200 L 122,210 L 132,212 L 122,214 L 120,224 L 118,214 L 108,212 L 118,210 Z" fill="#FFD700" opacity="0.6"/>
            <circle cx="200" cy="650" r="3" opacity="0.7"/>
            <circle cx="250" cy="580" r="5" opacity="0.9"/>
            <circle cx="350" cy="680" r="4" opacity="0.6"/>
            <circle cx="420" cy="520" r="6" opacity="1"/>
            <circle cx="680" cy="480" r="4" opacity="0.8"/>
            <circle cx="750" cy="550" r="5" opacity="0.9"/>
            <circle cx="820" cy="650" r="3" opacity="0.5"/>
            <circle cx="950" cy="500" r="4" opacity="0.8"/>
            <circle cx="150" cy="350" r="4" opacity="0.6"/>
            <circle cx="880" cy="150" r="3" opacity="0.5"/>
            <circle cx="500" cy="200" r="2" opacity="0.4"/>
            <circle cx="700" cy="300" r="3" opacity="0.6"/>
        </g>
        
</svg>