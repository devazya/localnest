<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="30%" r="80%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#fdf4e6"/>
      <stop offset="40%" stop-color="#f8d8b0"/>
      <stop offset="100%" stop-color="#eeb880"/>
    </radialGradient>

    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#8a5315" flood-opacity="0.3"/>
    </filter>

    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#b87b38" flood-opacity="0.6"/>
    </filter>

    <g id="coil">
      <path d="M 0,0 C -15,2 15,10 0,12" fill="none" stroke="#a36321" stroke-width="4" stroke-linecap="round"/>
      <circle cx="-5" cy="6" r="3" fill="#613b14" />
    </g>
  </defs>

  <rect width="400" height="500" fill="url(#bgGrad)"/>

  <path d="M 320,150 C 400,200 450,250 350,300" fill="none" stroke="#f6ce9d" stroke-width="3" opacity="0.7"/>

  <g transform="translate(200, 220) rotate(-15)">
    <polygon points="-80,-110 90,-110 100,120 -70,120" fill="#d97a1c" filter="url(#drop-shadow)"/>
    
    <rect x="20" y="115" width="60" height="10" rx="3" fill="#a55a10" />
    
    <polygon points="-85,-115 80,-115 90,110 -75,110" fill="#f8f4f0"/>
    <polygon points="-90,-120 70,-120 80,100 -80,100" fill="#ffffff" filter="url(#drop-shadow)"/>

    <circle cx="-40" cy="-80" r="10" fill="#a8b8cc"/>
    <rect x="-20" y="-83" width="70" height="4" rx="2" fill="#d0d0d0"/>
    <rect x="-20" y="-75" width="50" height="2" rx="1" fill="#d0d0d0"/>
    
    <path d="M -50,-40 L -40,-50 L -30,-40 Z" fill="#d9aa7a"/>
    <rect x="-15" y="-43" width="75" height="4" rx="2" fill="#d0d0d0"/>
    
    <rect x="-48" y="-5" width="16" height="12" rx="2" fill="#d9aa7a"/>
    <rect x="-20" y="-3" width="85" height="4" rx="2" fill="#d0d0d0"/>
    <rect x="-20" y="5" width="60" height="2" rx="1" fill="#d0d0d0"/>
    
    <circle cx="-40" cy="35" r="8" fill="#d9aa7a"/>
    <rect x="-20" y="32" width="65" height="4" rx="2" fill="#d0d0d0"/>

    <use href="#coil" x="-88" y="-110" />
    <use href="#coil" x="-87" y="-90" />
    <use href="#coil" x="-86" y="-70" />
    <use href="#coil" x="-85" y="-50" />
    <use href="#coil" x="-84" y="-30" />
    <use href="#coil" x="-83" y="-10" />
    <use href="#coil" x="-82" y="10" />
    <use href="#coil" x="-81" y="30" />
    <use href="#coil" x="-80" y="50" />
    <use href="#coil" x="-79" y="70" />
    <use href="#coil" x="-78" y="90" />
  </g>

  <text x="200" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#text-shadow)">Study Group</text>

</svg>
