<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Glass Cup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
        }
        .steam {
            animation: rise 3s infinite ease-in-out;
        }
        .steam-2 { animation-delay: 1s; }
        .steam-3 { animation-delay: 2s; }
    </style>
</head>
<body class="bg-[#D2B48C] flex items-center justify-center min-h-screen">

    <svg viewBox="0 0 200 200" class="w-48 h-48 mx-auto">
        <defs>
            <!-- Reflective highlights for glass feel -->
            <linearGradient id="glassGradient" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
                <stop offset="50%" stop-color="rgba(255,255,255,0.1)" />
                <stop offset="100%" stop-color="rgba(255,255,255,0.3)" />
            </linearGradient>
        </defs>

        <!-- Subtle Shadow -->
        <ellipse cx="100" cy="165" rx="35" ry="8" fill="rgba(0,0,0,0.15)" />

        <!-- Steam -->
        <path class="steam" d="M100 80 Q 110 60 100 40" stroke="rgba(255,255,255,0.8)" stroke-width="2" fill="none" stroke-linecap="round" />
        <path class="steam steam-2" d="M115 85 Q 125 65 115 45" stroke="rgba(255,255,255,0.8)" stroke-width="2" fill="none" stroke-linecap="round" />
        
        <!-- Liquid inside -->
        <path d="M65 90 L 135 90 L 130 150 Q 100 160 70 150 L 65 90" fill="rgba(101, 67, 33, 0.8)" />

        <!-- Glass Body -->
        <path d="M60 80 L 140 80 L 130 155 Q 100 165 70 155 L 60 80" 
              fill="url(#glassGradient)" 
              stroke="rgba(255,255,255,0.5)" 
              stroke-width="3" 
              stroke-linejoin="round" />
        
        <!-- Glass Rim -->
        <ellipse cx="100" cy="80" rx="40" ry="8" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.6)" stroke-width="2" />
        
        <!-- Handle -->
        <path d="M140 100 Q 165 100 165 120 Q 165 140 140 140" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round" />
    </svg>

</body>
</html>
