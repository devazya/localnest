<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c19ef6" />
      <stop offset="100%" stop-color="#8a53ea" />
    </linearGradient>

    <radialGradient id="shellGrad" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#df7aff" />
      <stop offset="30%" stop-color="#9d21d6" />
      <stop offset="85%" stop-color="#4a0572" />
      <stop offset="100%" stop-color="#2a0044" />
    </radialGradient>

    <radialGradient id="shellGradRight" cx="65%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#df7aff" />
      <stop offset="30%" stop-color="#9d21d6" />
      <stop offset="85%" stop-color="#4a0572" />
      <stop offset="100%" stop-color="#2a0044" />
    </radialGradient>

    <linearGradient id="cushionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141316" />
      <stop offset="30%" stop-color="#4a484f" />
      <stop offset="70%" stop-color="#2a292d" />
      <stop offset="100%" stop-color="#0a0a0c" />
    </linearGradient>
    
    <linearGradient id="bandHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d65aff" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d65aff" stop-opacity="0.0"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#341066" flood-opacity="0.85"/>
    </filter>

    <filter id="blurShadow">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <filter id="heavyBlur">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <rect width="200" height="240" rx="16" fill="url(#bgGrad)" />

  <ellipse cx="100" cy="190" rx="75" ry="14" fill="#4d2191" opacity="0.6" filter="url(#heavyBlur)" />
  <ellipse cx="100" cy="190" rx="50" ry="6" fill="#2d0a5e" opacity="0.9" filter="url(#blurShadow)" />

  <g filter="url(#shadow)">
    
    <path d="M 46 120 A 54 54 0 0 1 154 120" fill="none" stroke="#211f24" stroke-width="14" stroke-linecap="round" />
    <path d="M 48 120 A 52 52 0 0 1 152 120" fill="none" stroke="#5a5763" stroke-width="2" stroke-linecap="round" />

    <path d="M 38 120 A 62 62 0 0 1 162 120" fill="none" stroke="url(#shellGrad)" stroke-width="22" stroke-linecap="round" />
    
    <path d="M 40 120 A 60 60 0 0 1 160 120" fill="none" stroke="url(#bandHighlight)" stroke-width="2" stroke-linecap="round" opacity="0.8" />

    <g id="left-earcup">
      <ellipse cx="50" cy="125" rx="15" ry="42" fill="url(#cushionGrad)" />
      <ellipse cx="54" cy="125" rx="5" ry="24" fill="#080808" />
      <path d="M 43 90 Q 34 125 43 160" fill="none" stroke="#7a7687" stroke-width="1.5" opacity="0.4" />
      
      <ellipse cx="36" cy="125" rx="16" ry="38" fill="url(#shellGrad)" />
      <ellipse cx="34" cy="125" rx="7" ry="22" fill="#310052" opacity="0.9" />
      <ellipse cx="34" cy="125" rx="7" ry="22" fill="none" stroke="#7c12a8" stroke-width="1" />
      
      <path d="M 28 95 Q 18 125 28 155" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" filter="url(#blurShadow)"/>
    </g>

    <g id="right-earcup">
      <ellipse cx="150" cy="125" rx="15" ry="42" fill="url(#cushionGrad)" />
      <ellipse cx="146" cy="125" rx="5" ry="24" fill="#080808" />
      <path d="M 157 90 Q 166 125 157 160" fill="none" stroke="#7a7687" stroke-width="1.5" opacity="0.4" />
      
      <ellipse cx="164" cy="125" rx="16" ry="38" fill="url(#shellGradRight)" />
      <ellipse cx="166" cy="125" rx="7" ry="22" fill="#310052" opacity="0.9" />
      <ellipse cx="166" cy="125" rx="7" ry="22" fill="none" stroke="#7c12a8" stroke-width="1" />
      
      <path d="M 172 95 Q 182 125 172 155" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" filter="url(#blurShadow)"/>
    </g>
  </g>
</svg>
